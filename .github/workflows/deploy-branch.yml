name: deploy-branch

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - test

jobs:
  build-and-deploy:
    name: build & deploy → ${{ inputs.environment }}
    runs-on: windows-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set preview version
        id: version
        run: |
          $branch = "${{ github.ref_name }}" -replace '/', '-'
          $sha = "${{ github.sha }}".Substring(0, 7)
          $version = "1.0.${{ github.run_number }}-pr.$branch+$sha"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore & Publish
        run: |
          dotnet restore TESTAPI/TESTAPI.csproj
          dotnet publish TESTAPI/TESTAPI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o publish/

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: testapi-preview-${{ steps.version.outputs.version }}
          path: publish/
          retention-days: 3

      - name: Deploy to ${{ inputs.environment }}
        run: |
          echo "Deploying branch '${{ github.ref_name }}' (${{ steps.version.outputs.version }}) to ${{ inputs.environment }}"
          echo "Replace this step with your actual deploy command"

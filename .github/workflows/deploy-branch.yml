name: deploy-branch

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - test
      testlib_sha:
        description: 'TESTLIB commit SHA (leave blank for default)'
        required: false

env:
  TESTLIB_SHA: 45b5954b0c4a6c7b8dbe80edaac99804b9c7d778

jobs:
  build-and-deploy:
    name: build & deploy → ${{ inputs.environment }}
    runs-on: [self-hosted, windows, iis]
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Checkout TESTLIB
        uses: actions/checkout@v4
        with:
          repository: qumbarraza/TESTLIB
          ref: ${{ inputs.testlib_sha || env.TESTLIB_SHA }}
          path: TESTLIB

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set preview version
        id: version
        run: |
          $branch = "${{ github.ref_name }}" -replace '[/\\]', '-'
          $sha = "${{ github.sha }}".Substring(0, 7)
          $version = "1.0.${{ github.run_number }}-pr.$branch+$sha"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore & Publish
        run: |
          dotnet restore TESTAPI/TESTAPI/TESTAPI.csproj
          dotnet publish TESTAPI/TESTAPI/TESTAPI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o publish/

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: testapi-preview-${{ steps.version.outputs.version }}
          path: publish/
          retention-days: 3

      - name: Deploy to IIS (${{ inputs.environment }})
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/TESTAPI/deploy/iis-deploy.ps1 `
            -Environment "${{ inputs.environment }}" `
            -ArtifactPath "${{ github.workspace }}\publish" `
            -Version "${{ steps.version.outputs.version }}"

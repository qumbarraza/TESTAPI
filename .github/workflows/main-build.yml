name: main-build

on:
  push:
    branches:
      - main

env:
  TESTLIB_SHA: 45b5954b0c4a6c7b8dbe80edaac99804b9c7d778

jobs:
  build-and-release:
    name: build & release
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.version.outputs.artifact-name }}

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Checkout TESTLIB @ ${{ env.TESTLIB_SHA }}
        uses: actions/checkout@v4
        with:
          repository: qumbarraza/TESTLIB
          ref: ${{ env.TESTLIB_SHA }}
          path: TESTLIB

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set version
        id: version
        run: |
          $version = "1.0.${{ github.run_number }}"
          $artifactName = "testapi-$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore TESTAPI/TESTAPI/TESTAPI.csproj

      - name: Publish
        run: |
          dotnet publish TESTAPI/TESTAPI/TESTAPI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o publish/

      - name: Zip artifact
        run: Compress-Archive -Path publish/* -DestinationPath testapi-${{ steps.version.outputs.version }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact-name }}
          path: testapi-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Artifact: `${{ steps.version.outputs.artifact-name }}`
            TESTAPI commit: ${{ github.sha }}
            TESTLIB commit: ${{ env.TESTLIB_SHA }}
          files: testapi-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false

  deploy-dev:
    name: deploy → dev
    needs: build-and-release
    runs-on: [self-hosted, windows, iis]
    environment: dev

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: |
          $zip = Get-ChildItem -Path artifact -Filter *.zip | Select-Object -First 1 -ExpandProperty FullName
          Expand-Archive -Path $zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (dev)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/TESTAPI/deploy/iis-deploy.ps1 `
            -Environment dev `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

  deploy-test:
    name: deploy → test
    needs: build-and-release
    runs-on: [self-hosted, windows, iis]
    environment: test

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: |
          $zip = Get-ChildItem -Path artifact -Filter *.zip | Select-Object -First 1 -ExpandProperty FullName
          Expand-Archive -Path $zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (test)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/TESTAPI/deploy/iis-deploy.ps1 `
            -Environment test `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

  deploy-stage:
    name: deploy → stage
    needs: [build-and-release, deploy-dev, deploy-test]
    runs-on: [self-hosted, windows, iis]
    environment: stage

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: |
          $zip = Get-ChildItem -Path artifact -Filter *.zip | Select-Object -First 1 -ExpandProperty FullName
          Expand-Archive -Path $zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (stage)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/TESTAPI/deploy/iis-deploy.ps1 `
            -Environment stage `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

  deploy-prod:
    name: deploy → prod
    needs: [build-and-release, deploy-stage]
    runs-on: [self-hosted, windows, iis]
    environment: prod

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: |
          $zip = Get-ChildItem -Path artifact -Filter *.zip | Select-Object -First 1 -ExpandProperty FullName
          Expand-Archive -Path $zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (prod)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/TESTAPI/deploy/iis-deploy.ps1 `
            -Environment prod `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

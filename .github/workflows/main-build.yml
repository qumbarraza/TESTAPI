name: main-build

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: build & release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.version.outputs.artifact-name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set version
        id: version
        run: |
          $version = "1.0.${{ github.run_number }}"
          $artifactName = "testapi-$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore TESTAPI/TESTAPI.csproj
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        run: |
          dotnet publish TESTAPI/TESTAPI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o publish/

      - name: Zip artifact
        run: Compress-Archive -Path publish/* -DestinationPath testapi-${{ steps.version.outputs.version }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact-name }}
          path: testapi-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            Artifact: `${{ steps.version.outputs.artifact-name }}`
            Commit: ${{ github.sha }}
            Built from: `main`
          draft: false
          prerelease: false

  deploy-dev:
    name: deploy → dev
    needs: build-and-release
    runs-on: [self-hosted, windows, iis]
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: Expand-Archive -Path artifact/*.zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (dev)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/deploy/iis-deploy.ps1 `
            -Environment dev `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

  deploy-test:
    name: deploy → test
    needs: build-and-release
    runs-on: [self-hosted, windows, iis]
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: Expand-Archive -Path artifact/*.zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (test)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/deploy/iis-deploy.ps1 `
            -Environment test `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

  deploy-stage:
    name: deploy → stage
    needs: [build-and-release, deploy-dev, deploy-test]
    runs-on: [self-hosted, windows, iis]
    environment: stage

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: Expand-Archive -Path artifact/*.zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (stage)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/deploy/iis-deploy.ps1 `
            -Environment stage `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

  deploy-prod:
    name: deploy → prod
    needs: [build-and-release, deploy-stage]
    runs-on: [self-hosted, windows, iis]
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.artifact-name }}
          path: artifact/

      - name: Extract
        run: Expand-Archive -Path artifact/*.zip -DestinationPath artifact/publish/ -Force

      - name: Deploy to IIS (prod)
        run: |
          powershell -ExecutionPolicy Bypass -File TESTAPI/deploy/iis-deploy.ps1 `
            -Environment prod `
            -ArtifactPath "${{ github.workspace }}\artifact\publish" `
            -Version "${{ needs.build-and-release.outputs.version }}"

name: ci

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main

env:
  TESTLIB_SHA: 45b5954b0c4a6c7b8dbe80edaac99804b9c7d778

jobs:
  build:
    name: build
    runs-on: windows-latest

    steps:
      - name: Checkout TESTAPI
        uses: actions/checkout@v4
        with:
          path: TESTAPI

      - name: Checkout TESTLIB @ ${{ env.TESTLIB_SHA }}
        uses: actions/checkout@v4
        with:
          repository: qumbarraza/TESTLIB
          ref: ${{ env.TESTLIB_SHA }}
          path: TESTLIB

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore TESTAPI/TESTAPI/TESTAPI.csproj

      - name: Build
        run: dotnet build TESTAPI/TESTAPI/TESTAPI.csproj -c Release --no-restore

      - name: Test
        run: dotnet test TESTAPI/TESTAPI/TESTAPI.csproj --no-build -c Release --verbosity normal

      - name: Upload branch artifact
        uses: actions/upload-artifact@v4
        with:
          name: testapi-branch-${{ github.run_number }}-${{ github.sha }}
          path: TESTAPI/TESTAPI/bin/Release/
          retention-days: 3

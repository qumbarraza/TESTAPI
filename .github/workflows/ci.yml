name: ci

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore TESTAPI/TESTAPI.csproj

      - name: Build
        run: dotnet build TESTAPI/TESTAPI.csproj -c Release --no-restore

      - name: Test
        run: dotnet test TESTAPI/TESTAPI.csproj --no-build -c Release --verbosity normal

      - name: Upload branch artifact
        uses: actions/upload-artifact@v4
        with:
          name: testapi-branch-${{ github.run_number }}-${{ github.sha }}
          path: |
            TESTAPI/bin/Release/
          retention-days: 3
